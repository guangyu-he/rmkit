# xochitl.service drop-in: 注入 LD_PRELOAD + QML 资源重建器
# 安装路径: /etc/systemd/system/xochitl.service.d/zz-rmkit-cn.conf
# 必须由 install.sh 走 bind-mount 双写到 lowerdir (ext4) + upperdir (tmpfs)
# 详见 docs/architecture.md "核心机制 1: LD_PRELOAD 注入"

[Unit]
# 必须 After=, 绝不 Requires=  (rm2 上 home.mount unit 不存在,
# Requires= 会卡 multi-user.target → 假性砖机, 详见 memory feedback_xochitl_dropin_after_home)
After=home.mount

[Service]
# qmldiff 首次重建 hashtab 可能耗时, 关闭 watchdog 防误杀
WatchdogSec=0

# upload-server / qml 侧需要 XHR 读写 file://
Environment="QML_DISABLE_DISK_CACHE=1"
Environment="QML_XHR_ALLOW_FILE_WRITE=1"
Environment="QML_XHR_ALLOW_FILE_READ=1"

# 入口: xovi.so + 输入法 hook
Environment="LD_PRELOAD=/home/root/xovi/xovi.so:/home/root/rmkit-cn/bin/ime_hook.so"

# qt-resource-rebuilder 加载中文资源 rcc
Environment="QT_RESOURCE_REBUILDER_PATH=/home/root/xovi/exthome/qt-resource-rebuilder/zh_CN.rcc"
